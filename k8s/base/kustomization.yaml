apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: alpha-trading

resources:
  - namespace.yaml
  - configmap.yaml
  # app-secret 은 SOPS 로 관리: k8s/secrets/app-secret.enc.yaml
  # deploy-local.sh 가 sops --decrypt | kubectl apply 단계로 직접 적용한다.
  # 인프라(postgres/redis/minio)는 Bitnami Helm chart로 배포.
  # k8s/helm/bitnami-values/ 참조.
  - api.yaml
  - worker.yaml
  - tick-collector.yaml
  - ui.yaml
  - ingress.yaml
  # migration-job.yaml — standalone 수동 실행용으로 보존.
  # 마이그레이션은 api.yaml initContainers로 매 배포 자동 실행.
  # gen 시뮬레이터(gen + gen-collector) 는 별도 overlay 로 분리되었다.
  # 활성화: kubectl apply -k k8s/overlays/gen/
  # 데이터는 alpha_gen_db (별도 DB) 에만 쓰이며 실 alpha_db 와 격리된다.

# LLM 인증 Secret — .secrets/ 폴더에서 자동 생성
# 초기화: k8s/scripts/init-llm.sh (최초 1회)
# 이후: kubectl apply -k 시 자동 포함
generatorOptions:
  disableNameSuffixHash: true

secretGenerator:
  - name: llm-credentials
    files:
      - gcloud-adc=.secrets/gcloud-adc.json
      - CLAUDE_CODE_OAUTH_TOKEN=.secrets/claude-token
    type: Opaque

labels:
  - pairs:
      app.kubernetes.io/part-of: alpha-trading
      app.kubernetes.io/managed-by: kustomize
