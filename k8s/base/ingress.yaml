# nginx ingress controller
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: alpha-trading
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 8000
          - path: /health
            pathType: Exact
            backend:
              service:
                name: api
                port:
                  number: 8000
          - path: /docs
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ui
                port:
                  number: 5173
